<!-- @dsCard group="Colors" viewport="700x150" name="Ink ramp" subtitle="Warm-neutral charcoals for text on paper" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px; font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--border); border-radius: var(--radius-xs); overflow: hidden; }
  .chip { height: 56px; }
  .meta { padding: 6px 8px; background: var(--paper-0); }
  .name { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--ink-900); }
  .hex { font-family: var(--font-mono); font-size: var(--text-3xs); color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="meta"><div class="name">ink-900</div><div class="hex">#1A1A1A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="meta"><div class="name">ink-700</div><div class="hex">#3C3A36</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="meta"><div class="name">ink-500</div><div class="hex">#6B675E</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><div class="meta"><div class="name">ink-400</div><div class="hex">#8A857A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><div class="meta"><div class="name">ink-300</div><div class="hex">#B4AE9F</div></div></div>
  </div>
</body>
</html>
