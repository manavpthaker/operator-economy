<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px 26px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .line { display: flex; align-items: center; gap: 16px; }
  .tag { width: 120px; flex: 0 0 auto; font-family: var(--font-mono); font-size: var(--text-3xs); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="tag">oe-label</span><span class="oe-label">Unit economics</span></div>
    <div class="line"><span class="tag">oe-caps</span><span class="oe-caps">Operator Blueprint №004 · Rev B</span></div>
    <div class="line"><span class="tag">sheet tag</span><span class="oe-caps" style="color:var(--drafting-blue);font-weight:600">Sheet 02 of 05 — Unit economics</span></div>
    <div class="line"><span class="tag">accent label</span><span class="oe-label" style="color:var(--drafting-blue)">The attach effect</span></div>
  </div>
</body>
</html>
