<!-- @dsCard group="Brand" viewport="700x200" name="Wordmark" subtitle="No logo mark exists — the name is set in type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 26px; font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 22px; }
  .mark { display: flex; flex-direction: column; gap: 2px; }
  .wm { font-family: var(--font-heading); font-weight: 700; font-size: 34px; color: var(--ink-900); letter-spacing: -0.01em; line-height: 1; }
  .wm .the { font-size: 18px; color: var(--text-muted); font-weight: 500; letter-spacing: .02em; display: block; margin-bottom: 2px; }
  .on-ink { background: var(--ink); padding: 20px 22px; border-radius: var(--radius-xs); }
  .on-ink .wm { color: var(--paper); }
  .on-ink .the { color: var(--text-on-ink-muted); }
  .hand { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-muted); letter-spacing: .04em; }
</style>
</head>
<body>
  <div class="stack">
    <div style="display:flex;gap:40px;align-items:center;flex-wrap:wrap">
      <div class="mark"><span class="wm"><span class="the">The</span>Operator Economy</span></div>
      <div class="on-ink"><div class="mark"><span class="wm"><span class="the">The</span>Operator Economy</span></div></div>
    </div>
    <span class="hand">Handle @operatoreconomy · theoperatoreconomy.com — no logo mark provided; set in Zodiak 700 (Boska at display sizes)</span>
  </div>
</body>
</html>
