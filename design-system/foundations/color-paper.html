<!-- @dsCard group="Colors" viewport="700x150" name="Paper ramp & rules" subtitle="Warm cream surfaces and hairlines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px; font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--border); border-radius: var(--radius-xs); overflow: hidden; }
  .chip { height: 56px; }
  .meta { padding: 6px 8px; background: var(--paper-0); border-top: 1px solid var(--border); }
  .name { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--ink-900); }
  .hex { font-family: var(--font-mono); font-size: var(--text-3xs); color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--paper-0)"></div><div class="meta"><div class="name">paper-0</div><div class="hex">#FBF8F1</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-100)"></div><div class="meta"><div class="name">paper-100</div><div class="hex">#F5F0E6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-200)"></div><div class="meta"><div class="name">paper-200</div><div class="hex">#EDE7D8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-300)"></div><div class="meta"><div class="name">paper-300</div><div class="hex">#E2DAC7</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--rule)"></div><div class="meta"><div class="name">rule</div><div class="hex">#D8CFB9</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--rule-strong)"></div><div class="meta"><div class="name">rule-strong</div><div class="hex">#C4B99E</div></div></div>
  </div>
</body>
</html>
