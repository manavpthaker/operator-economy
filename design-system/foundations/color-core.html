<!-- @dsCard group="Colors" viewport="700x200" name="Core palette" subtitle="The five named colors — one palette, not two" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px; font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--border); border-radius: var(--radius-xs); overflow: hidden; background: var(--paper-0); }
  .chip { height: 84px; }
  .meta { padding: 8px 10px; }
  .name { font-size: var(--text-sm); font-weight: var(--w-semibold); color: var(--ink-900); }
  .hex { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-muted); letter-spacing: .02em; margin-top: 2px; }
  .use { font-size: var(--text-3xs); color: var(--text-faint); margin-top: 4px; line-height: 1.3; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="meta"><div class="name">Ink</div><div class="hex">#1A1A1A</div><div class="use">Text · video bg</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--paper);border-bottom:1px solid var(--border)"></div><div class="meta"><div class="name">Paper</div><div class="hex">#F5F0E6</div><div class="use">Page · print</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--drafting-blue)"></div><div class="meta"><div class="name">Drafting Blue</div><div class="hex">#1F3A5F</div><div class="use">Accent on paper</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-schematic)"></div><div class="meta"><div class="name">Schematic Navy</div><div class="hex">#14263E</div><div class="use">The working panel</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-bright)"></div><div class="meta"><div class="name">Ledger Gold</div><div class="hex">#C4A45F</div><div class="use">Arrow + key figure on dark</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sage)"></div><div class="meta"><div class="name">Sage</div><div class="hex">#7B9E87</div><div class="use">Live/verified status only</div></div></div>
  </div>
</body>
</html>
