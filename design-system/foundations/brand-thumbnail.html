<!-- @dsCard group="Brand" viewport="700x300" name="Thumbnail motif" subtitle="Evidence object + gap arrow + 4 words, on the drafting grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px 26px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .thumb { aspect-ratio: 16/9; background: var(--ink-900); padding: 20px 22px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden;
    background-image: repeating-linear-gradient(0deg, var(--schem-grid) 0 1px, transparent 1px 24px), repeating-linear-gradient(90deg, var(--schem-grid) 0 1px, transparent 1px 24px); }
  .strip { font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--paper-100); border: 1px solid rgba(245,240,230,.35); border-left: 2px solid var(--gold-bright); padding: 4px 8px; align-self: flex-start; }
  .big { font-family: var(--font-mono); font-weight: 400; color: var(--paper); line-height: .95; font-size: 46px; letter-spacing: -0.02em; }
  .big .au { color: var(--gold-bright); }
  .words { font-family: var(--font-heading); font-weight: 900; font-size: 24px; color: var(--paper); line-height: 1.02; letter-spacing: -0.02em; }
  .words em { font-style: italic; }
  .foot { font-family: var(--font-mono); font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: rgba(245,240,230,.4); }
</style>
</head>
<body>
  <div class="row">
    <div class="thumb">
      <span class="strip">Blueprint №004</span>
      <span class="big">$5.9B <span class="au">→</span> <span class="au">$2K</span></span>
      <span class="foot">The Operator Economy</span>
    </div>
    <div class="thumb">
      <span class="strip">Blueprint №005</span>
      <span class="words">They don't need it built.<br />They need it <em>installed.</em></span>
      <span class="foot">The Operator Economy</span>
    </div>
  </div>
</body>
</html>
