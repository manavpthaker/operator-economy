<!-- @dsCard group="Colors" viewport="700x180" name="Accent ramps" subtitle="Drafting Blue, Ledger Gold, Sage — with AA text tints" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px; font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .grp { display: flex; align-items: center; gap: 8px; }
  .lbl { width: 96px; font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-muted); }
  .sw { flex: 1; height: 40px; border-radius: var(--radius-xs); border: 1px solid rgba(0,0,0,.08); display: flex; align-items: center; padding: 0 10px; font-family: var(--font-mono); font-size: var(--text-3xs); }
</style>
</head>
<body>
  <div class="stack">
    <div class="grp"><span class="lbl">blue</span>
      <span class="sw" style="background:var(--blue-900);color:#fff">900 · #14263E</span>
      <span class="sw" style="background:var(--blue-700);color:#fff">700 · #1F3A5F</span>
      <span class="sw" style="background:var(--blue-500);color:#fff">500 · #35608C</span>
      <span class="sw" style="background:var(--blue-tint);color:var(--drafting-blue)">tint · #E4E9F0</span>
    </div>
    <div class="grp"><span class="lbl">gold</span>
      <span class="sw" style="background:var(--gold-700);color:#fff">700 · #7A5E24 · text on paper</span>
      <span class="sw" style="background:var(--gold-500);color:#fff">500 · #B08D3E · fills</span>
      <span class="sw" style="background:var(--gold-bright);color:#1A1A1A">bright · #C4A45F · on dark</span>
      <span class="sw" style="background:var(--gold-tint);color:var(--gold-700)">tint · #EFE6CF</span>
    </div>
    <div class="grp"><span class="lbl">sage / neg</span>
      <span class="sw" style="background:var(--sage-700);color:#fff">sage-700 · #5E7F6A</span>
      <span class="sw" style="background:var(--sage-500);color:#fff">sage-500 · #7B9E87</span>
      <span class="sw" style="background:var(--negative);color:#fff">negative · #9B3E2E</span>
    </div>
  </div>
</body>
</html>
