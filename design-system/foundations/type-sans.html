<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px 26px; }
  .stack { display: flex; flex-direction: column; gap: 14px; max-width: 620px; }
  .line { display: flex; gap: 16px; }
  .tag { width: 108px; flex: 0 0 auto; font-family: var(--font-mono); font-size: var(--text-3xs); color: var(--text-muted); padding-top: 3px; }
  .sans { font-family: var(--font-sans); color: var(--ink-700); }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="tag">lead · 20/400</span><span class="sans" style="font-size:20px;line-height:1.6">Real companies, sourced numbers, exact playbooks.</span></div>
    <div class="line"><span class="tag">body · 17/400</span><span class="sans" style="font-size:17px;line-height:1.65">Every business now knows it's supposed to use AI, and almost none of them know how. That gap is a service business.</span></div>
    <div class="line"><span class="tag">ui · 15/500</span><span class="sans" style="font-size:15px;font-weight:500">Download the blueprint</span></div>
    <div class="line"><span class="tag">small · 13/400</span><span class="sans" style="font-size:13px;color:var(--text-muted)">Sources in the pinned comment.</span></div>
  </div>
</body>
</html>
