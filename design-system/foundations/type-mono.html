<!-- @dsCard group="Type" viewport="700x230" name="Mono data — Fragment Mono" subtitle="Single 400 weight — scale carries emphasis, never synthetic bold" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px 26px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .figs { display: flex; gap: 30px; align-items: baseline; flex-wrap: wrap; }
  .fig { font-family: var(--font-mono); font-weight: 400; color: var(--ink-900); font-feature-settings: 'tnum' 1, 'zero' 1; letter-spacing: -0.01em; }
  .u { font-size: .5em; font-weight: 500; }
  .cap { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-muted); letter-spacing: .04em; }
  .cite { display:inline-flex; gap:8px; align-items:center; padding:4px 10px; border:1px solid var(--border); border-left:2px solid var(--drafting-blue); border-radius:var(--radius-xs); background:var(--paper-0); font-family:var(--font-mono); font-size:var(--text-2xs); color:var(--ink-700); }
  .cite b { color:var(--drafting-blue); font-size:var(--text-3xs); letter-spacing:.08em; }
</style>
</head>
<body>
  <div class="stack">
    <div class="figs">
      <span class="fig" style="font-size:52px">$5.9<span class="u">B</span></span>
      <span class="fig" style="font-size:52px;color:var(--gold-700)">31<span class="u">%</span></span>
      <span class="fig" style="font-size:52px">2<span class="u">×</span></span>
      <span class="fig" style="font-size:34px">$500–5,000<span class="u">/mo</span></span>
    </div>
    <div class="cap">0123456789 · tabular · slashed-zero · $ % × /mo · single weight 400</div>
    <span class="cite"><b>SOURCE</b> Sacra · Apr 2026</span>
  </div>
</body>
</html>
