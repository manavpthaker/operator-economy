<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--ink); padding: 0; font-family: var(--font-sans); height: 100%; }
  .wrap { min-height: 116px; display: flex; align-items: center; gap: 0; padding: 22px 30px; }
  .tag { display: flex; align-items: baseline; gap: 14px; }
  .word { font-family: var(--font-display); font-weight: 700; font-size: 40px; color: var(--paper); letter-spacing: var(--tracking-display); line-height: 1; }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--gold-bright); align-self: flex-end; margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="tag">
      <span class="word">Build.</span>
      <span class="word">Own.</span>
      <span class="word">Operate.</span>
      <span class="dot"></span>
    </div>
  </div>
</body>
</html>
