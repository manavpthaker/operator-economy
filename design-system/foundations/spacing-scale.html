<!-- @dsCard group="Spacing" viewport="700x220" name="Spacing scale" subtitle="4px base — restrained, document-grade rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px 26px; font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .tag { width: 96px; flex: 0 0 auto; font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-muted); }
  .bar { height: 14px; background: var(--drafting-blue); border-radius: 1px; }
  .px { font-family: var(--font-mono); font-size: var(--text-3xs); color: var(--text-faint); }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="tag">space-1</span><span class="bar" style="width:4px"></span><span class="px">4px</span></div>
    <div class="row"><span class="tag">space-2</span><span class="bar" style="width:8px"></span><span class="px">8px</span></div>
    <div class="row"><span class="tag">space-3</span><span class="bar" style="width:12px"></span><span class="px">12px</span></div>
    <div class="row"><span class="tag">space-4</span><span class="bar" style="width:16px"></span><span class="px">16px</span></div>
    <div class="row"><span class="tag">space-5</span><span class="bar" style="width:24px"></span><span class="px">24px</span></div>
    <div class="row"><span class="tag">space-6</span><span class="bar" style="width:32px"></span><span class="px">32px</span></div>
    <div class="row"><span class="tag">space-7</span><span class="bar" style="width:48px"></span><span class="px">48px</span></div>
    <div class="row"><span class="tag">space-8</span><span class="bar" style="width:64px"></span><span class="px">64px</span></div>
  </div>
</body>
</html>
