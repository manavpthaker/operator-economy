<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Operator Economy — Thumbnail</title>
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); }
  .thumb { width: 1280px; height: 720px; background: var(--ink-900); padding: 48px 56px; display: flex; flex-direction: column; overflow: hidden;
    background-image: repeating-linear-gradient(0deg, var(--schem-grid) 0 1px, transparent 1px 36px), repeating-linear-gradient(90deg, var(--schem-grid) 0 1px, transparent 1px 36px); }
  .t-tag { align-self: flex-start; font-family: var(--font-mono); font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--paper-100); border: 1px solid rgba(245,240,230,.35); border-left: 2px solid var(--gold-bright); padding: 7px 12px; margin-left: 48px; }
  .t-fig { font-family: var(--font-mono); font-size: 150px; line-height: 1; color: var(--paper-100); letter-spacing: -0.03em; margin: 54px 0 10px; font-feature-settings: 'tnum' 1; }
  .t-fig .au { color: var(--gold-bright); }
  .t-brkh { width: 300px; margin-left: 470px; height: 9px; border: 1px solid rgba(245,240,230,.4); border-top: none; position: relative; }
  .t-brkh span { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); font-family: var(--font-mono); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: rgba(245,240,230,.65); white-space: nowrap; }
  .t-words { font-family: var(--font-heading); font-weight: 900; font-size: 64px; line-height: 1; letter-spacing: var(--tracking-heading); color: var(--paper-100); margin: 44px 0 0; }
  .t-words em { font-style: italic; } /* the ONE italic in this composition */
  .t-foot { margin-top: auto; display: flex; justify-content: space-between; align-items: flex-end; }
  .t-wm { font-family: var(--font-mono); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: rgba(245,240,230,.45); }
  .chip { display: inline-flex; align-items: center; gap: 8px; padding: 5px 11px; font-family: var(--font-mono); font-size: 11px; background: rgba(26,26,26,.5); border: 1px solid rgba(245,240,230,.22); border-left: 2px solid var(--gold-bright); color: rgba(245,240,230,.8); }
  .chip b { font-weight: 400; font-size: 10px; letter-spacing: .1em; color: var(--gold-bright); }
</style>
</head>
<body>
<section class="thumb">
  <span class="t-tag">Blueprint №004</span>
  <div class="t-fig">$5.9B <span class="au">→</span> <span class="au">$2K</span></div>
  <div class="t-brkh"><span>The gap</span></div>
  <h2 class="t-words">Same service. <em>Solo scale.</em></h2>
  <div class="t-foot">
    <span class="t-wm">The Operator Economy</span>
    <span class="chip"><b>SOURCE</b> Accenture FY25</span>
  </div>
</section>
</body>
</html>
